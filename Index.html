<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الداني الرقمية 🚀</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a, #1e1b4b);
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-sub: #94a3b8;
            --primary: #00f2fe;
            --secondary: #9d4edd;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg-gradient); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; text-align: center; }
        .profile-section { margin-bottom: 40px; }
        .avatar { width: 90px; height: 90px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border-radius: 50%; margin: 0 auto 15px; display: flex; justify-content: center; align-items: center; font-size: 2.5rem; box-shadow: 0 0 25px rgba(0, 242, 254, 0.3); }
        h1 { font-size: 1.8rem; font-weight: 700; margin-bottom: 8px; background: linear-gradient(to left, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: var(--text-sub); font-size: 0.95rem; }
        .projects-grid { display: flex; flex-direction: column; gap: 15px; }
        .project-card { background: var(--card-bg); border: 1px solid var(--border-color); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); padding: 20px; border-radius: 20px; text-decoration: none; color: var(--text-main); display: flex; align-items: center; justify-content: space-between; transition: all 0.3s ease; }
        .project-card:hover { transform: translateY(-4px); border-color: var(--primary); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .project-info { text-align: right; display: flex; flex-direction: column; gap: 5px; }
        .project-title { font-size: 1.2rem; font-weight: 600; }
        .project-desc { font-size: 0.85rem; color: var(--text-sub); }
        .project-icon { font-size: 1.8rem; }
        .arrow { color: var(--text-sub); }
        .project-card:hover .arrow { color: var(--primary); }
        footer { margin-top: 40px; font-size: 0.8rem; color: var(--text-sub); opacity: 0.6; }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-section">
            <div class="avatar">👨‍💻</div>
            <h1>منصة أعمال الداني</h1>
            <p>مرحباً بكم! اختر المشروع الذي تريد تجربته بالأسفل 👇🏽</p>
        </div>
        <div class="projects-grid">
            
            <a href="#" id="shop-btn" class="project-card">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div class="project-icon">🏪</div>
                    <div class="project-info">
                        <div class="project-title">سوق الخدمات الرقمي</div>
                        <div class="project-desc">منصة ذكية لحجز وطلب الخدمات الإلكترونية.</div>
                    </div>
                </div>
                <div class="arrow">◀</div>
            </a>

            <a href="https://mosabomeraldany-byte.github.io/Question-game/" id="game-btn" class="project-card">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div class="project-icon">🧠</div>
                    <div class="project-info">
                        <div class="project-title">تحدي العباقرة والذكاء</div>
                        <div class="project-desc">لعبة تفاعلية ممتعة لاختبار معلوماتك.</div>
                    </div>
                </div>
                <div class="arrow">◀</div>
            </a>

        </div>
        <footer>تم التطوير بواسطة الداني © 2026</footer>
    </div>
</body>
  </html>
